<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran - Universitas Pamulang</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-pink-pastel { background-color: #ffd1dc !important; }
        .nav-link-custom { color: #495057 !important; transition: color 0.2s; }
        .nav-link-custom:hover, .nav-link-custom.active { color: #000000 !important; }
        .my-custom-bg {
            background-image: url('kampus-background.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed; 
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100 my-custom-bg">

    <header class="bg-pink-pastel text-dark text-center pt-5 pb-4 shadow-sm">
        <div class="container">
            <h1 class="fw-bold m-0 text-uppercase tracking-wide" style="color: #2b2b2b;">Universitas Pamulang</h1>
            <p class="lead small mt-2 text-secondary">Berbagi Untuk Negri</p>
            <nav class="navbar navbar-expand-lg navbar-light mt-4 p-0">
                <div class="container-fluid justify-content-center">
                    <ul class="navbar-nav gap-3 gap-md-4 flex-row flex-wrap justify-content-center">
                        <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link nav-link-custom" href="informasi.html">Informasi</a></li>
                        <li class="nav-item"><a class="nav-link nav-link-custom" href="jadwal.html">Jadwal Pendaftaran</a></li>
                        <li class="nav-item"><a class="nav-link nav-link-custom" href="hubungi-kami.html">Hubungi Kami</a></li>
                        <li class="nav-item"><a class="nav-link nav-link-custom active fw-semibold border-bottom border-2 border-dark pb-1" href="form.html">Form Pendaftaran</a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="card-title fw-bold h4 mb-4" style="color: #333;">Formulir Pendaftaran Mahasiswa Baru</h2>
                        
                        <form action="#" method="POST">
                            <div class="mb-3">
                                <label for="nama" class="form-label fw-medium">Nama Lengkap</label>
                                <input type="text" class="form-gradient form-control" id="nama" placeholder="Masukkan nama lengkap" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">Alamat Email</label>
                                <input type="email" class="form-control" id="email" placeholder="nama@email.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="prodi" class="form-label fw-medium">Pilihan Program Studi</label>
                                <select class="form-select" id="prodi" required>
                                    <option value="" selected disabled>Pilih program studi...</option>
                                    <option value="ti">Teknik Informatika</option>
                                    <option value="si">Sistem Informasi</option>
                                    <option value="mn">Manajemen</option>
                                    <option value="ak">Akuntansi</option>
                                    <option value="hk">Ilmu Hukum</option>
                                </select>
                            </div>
                            <button type="submit" class="btn text-white w-100 fw-bold mt-3 py-2" style="background-color: #e0a6b4;">Kirim Pendaftaran</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-pink-pastel text-dark text-center py-4 mt-auto border-top border-light">
        <div class="container">
            <p class="m-0 small fw-medium" style="color: #495057;">&copy; 2026 Universitas Pamulang</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
